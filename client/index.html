<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <!-- Title and meta tags are intentionally generic here.
         React hydrates within milliseconds and overwrites with correct
         branding values from the database. This prevents white-label
         deployments from briefly flashing old branding. -->
    <title>Loading...</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <!-- Canonical — set by React on hydration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap" rel="stylesheet" />
    <link rel="alternate" type="application/rss+xml" title="JAIME.IO Content Feed" href="/api/rss" />
    <!-- Google Analytics: injected dynamically by React when brand_gtag_id is configured.
         No hardcoded ID here — each deployment uses its own GA property.
         See client/src/hooks/useGtag.ts for the injection logic. -->
    <link rel="icon" type="image/png" href="/jaimeio-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/jaimeio-icon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/jaimeio-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/jaimeio-icon.png" />
      <!-- Brand theme defaults — prevents flash of wrong colors -->
    <style id="brand-defaults">
      :root {
        --brand-primary: #0f2d5e;
        --brand-secondary: #2dd4bf;
        --brand-background: #faf9f7;
        --brand-surface: #f3f0ed;
        --brand-text-primary: #0a0a0a;
        --brand-text-secondary: #6b7280;
        --brand-accent: #2dd4bf;
        --brand-border: #e5e7eb;
        --brand-nav-bg: #0f2d5e;
        --brand-nav-text: #ffffff;
        --brand-footer-bg: #0f2d5e;
        --brand-footer-text: #ffffff;
        --brand-button-bg: #0f2d5e;
        --brand-button-text: #ffffff;
        --brand-link: #2dd4bf;
        --brand-font-heading: "Playfair Display", serif;
        --brand-font-body: "Inter", sans-serif;
      }
    </style>
  </head>

  <body style="overflow-x:hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
