<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <!-- Title and meta tags are intentionally generic here.
         React hydrates within milliseconds and overwrites with correct
         branding values from the database. This prevents white-label
         deployments from briefly flashing Hambry-specific content. -->
    <title>Loading...</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
    <!-- Canonical — set by React on hydration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap" rel="stylesheet" />
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/api/rss" />
    <!-- Google Analytics: injected dynamically by React when brand_gtag_id is configured.
         No hardcoded ID here — each deployment uses its own GA property.
         See client/src/hooks/useGtag.ts for the injection logic. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.ico" />
    <link rel="apple-touch-icon" sizes="192x192" href="/android-chrome-192x192.png" />
  </head>

  <body style="overflow-x:hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
